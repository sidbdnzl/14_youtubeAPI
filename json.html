<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON演習</title>
</head>

<body>
    <script>
        let json = { 名前: '大谷翔平', ポジション: 'ピッチャー', 年齢: 22 };
        let jsonMenb = {
            メンバー: [
                { 姓: '鈴木', 名: '一郎' },
                { 姓: '田中', 名: '花子' },
                { 姓: '山田', 名: '太郎' }
            ]
        };
        console.log(
            json['年齢'],
            jsonMenb['メンバー'][1]['姓'],
            jsonMenb['メンバー'].length
        );
        //22 "田中" 3
    </script>
</body>

</html>
